	<style type="text/css">
		/* 滑动条高度、边框、背景色等 */
		#__nc{
			background-color: transparent !important;
		}
		body,html{
			padding: 0;
			margin: 0;
		}
		._nc .stage1 .slider {
			height: 30px;
			border-radius: 24px;
			background-color: #1B1527;
			overflow: hidden;
			box-shadow: none;
			left: 2px;
			right: 2px;
		}
		/* 滑动条 */
		
		._nc .stage1 .track div {
			border-radius: 4px;
			color: #fff;
			height: 30px;
			line-height: 30px;
			font-size: 12px;
		}
		/* 滑动条背景色-正常 */
		
		._nc .stage1 .bg-green {
			background: linear-gradient(270deg, #542f9e, #1B1527 100%);
			height: 30px;
		}
		/* 滑动条背景色-失败 */
		
		._nc .stage1 .bg-red {
			background-color: #ff5500;
		}
		
		._nc .stage1 .button {
			width: 30px;
			height: 30px;
			background: linear-gradient(180deg, #6835cb, rgba(31, 28, 59, 0.79) 100%);
			border-radius: 14px;
			box-shadow: 0px 2px 14px 0px rgba(0, 0, 0, 0.30);
		}
		._nc .stage1{
			height: 34px;
			margin: 0px;
			position: static;
			padding: 2px;
			background-color: #1B1527;
			box-sizing: border-box;
			border-radius: 16px;
			overflow: hidden;
		}
		._nc .stage1 .label {
			line-height: 30px;
			height: 30px;
			font-size: 12px;
		}
		
		._nc .icon-slide-arrow:before,
		._nc .icon-ok:before {
			display: none;
		}

			height: 30px;

	<body>

		<div id="__nc" style="margin-left:auto;margin-right:auto;width:100%;margin-top:auto;margin-bottom:auto;height:100%;">
			<div id="nc">
			</div>
		</div>

		<script>
			window.androidObj = function AndroidClass() {};

			var nc_token = ['FFFF0N000000000094CD', (new Date()).getTime(), Math.random()].join(':');
			console.log(nc_token)

			var nc = NoCaptcha.init({
				renderTo: '#nc',
				appkey: 'FFFF0N000000000094CD',
				scene: 'nc_register_h5',
				token: nc_token,
				trans: {
					'key1': 'code200'
				},
				elementID: ['usernameID'],
				is_Opt: 0,
				language: 'cn',
				timeout: 10000,
				retryTimes: 5,
				errorTimes: 5,
				inline: false,

				apimap: {
					// 'analyze': '//a.com/nocaptcha/analyze.jsonp',
					// 'uab_Url': '//aeu.alicdn.com/js/uac/909.js',
				},

				bannerHidden: false,
				initHidden: false,

				callback: function(data) {
					alert(data)
					let result = {
						'nc_token': nc_token,
						'sessionid': data.csessionid,
						'sig': data.sig
					};

					console.log("Callback: " + JSON.stringify(result));

					window.androidObj.tokenToAndroid(JSON.stringify(result));
				},

				error: function(s) {}
			});

			NoCaptcha.setEnabled(true);
			nc.reset(); //请务必确保这里调用一次reset()方法

			NoCaptcha.upLang('cn', {
				'LOADING': '加载中…', //加载
				'SLIDER_LABEL': '请按住滑块拖动到最右边', //等待滑动
				'CHECK_Y': '验证通过', //通过
				'ERROR_TITLE': '非常抱歉，这出错了…', //拦截
				'CHECK_N': '验证未通过', //准备唤醒二次验证
				'OVERLAY_INFORM': '经检测你当前操作环境存在风险，请输入验证码', //二次验证
				'TIPS_TITLE': '验证码错误，请重新输入' //验证码输错时的提示
			});
		</script>
